# yk-update-checker configuration
#
# update_type controls the maximum upgrade scope reported.
#   all   – any newer stable release (default)
#   major – any newer release (same as all)
#   minor – only minor and patch upgrades within the same major
#   patch – only patch upgrades within the same major.minor
update_type: all

# parallel_checks limits how many registry version lookups run at once.
# Lower values reduce memory and outbound connection pressure.
# Default: 5
parallel_checks: 5

repos:
  # Public repository — no auth required
  - name: homelab
    repo: https://github.com/example/my-gitops-repo
    path: kubernetes/apps          # optional: scan only this sub-path

  # Private repository — HTTPS token (GitHub/GitLab/Gitea personal access token)
  - name: private-helmfile
    repo: https://github.com/example/private-repo
    auth:
      type: token
      token: ghp_xxxxxxxxxxxxxxxxxxxx

  # Private repository — HTTPS basic auth
  - name: gitea-private
    repo: https://gitea.example.com/org/repo
    auth:
      type: basic
      username: myuser
      password: mypassword

  # Private repository — SSH key
  - name: ssh-repo
    repo: git@github.com:example/private-repo.git
    auth:
      type: ssh
      ssh_key_path: /etc/yk-update-checker/ssh/id_rsa
