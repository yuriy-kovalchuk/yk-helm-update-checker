# Example Kubernetes Secret for GitHub private repo access
# Usage:
#   1. Replace YOUR_GITHUB_TOKEN with your actual GitHub PAT
#   2. Apply: kubectl apply -f github-token-secret.yaml -n <namespace>
#   3. Reference in Helm values:
#      repos:
#        - name: my-private-repo
#          repo: https://github.com/org/private-repo
#          auth:
#            type: token
#            existingSecret: github-token
#            existingSecretKey: token
#
# To create the token:
#   GitHub -> Settings -> Developer settings -> Personal access tokens -> Tokens (classic)
#   Required scope: repo (full control of private repositories)

apiVersion: v1
kind: Secret
metadata:
  name: github-token
  # namespace: yk-update-checker  # uncomment and adjust as needed
type: Opaque
stringData:
  token: YOUR_GITHUB_TOKEN
