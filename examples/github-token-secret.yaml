# Kubernetes Secret for GitHub private repository access.
#
# 1. Replace YOUR_GITHUB_TOKEN with a GitHub PAT.
#    Required scope: repo (Contents: read)
#    GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
#
# 2. Apply to the same namespace as the chart:
#    kubectl apply -f github-token-secret.yaml -n yk-update-checker
#
# 3. Reference in values.yaml:
#    scanner:
#      config:
#        repos:
#          - name: my-private-repo
#            repo: https://github.com/org/private-repo
#            auth:
#              type: token
#              existingSecret: github-token
#              existingSecretKey: token

apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: yk-update-checker
type: Opaque
stringData:
  token: YOUR_GITHUB_TOKEN
