name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ── Go: lint, vet, test ────────────────────────────────────────────────────
  go:
    name: Go lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        continue-on-error: true
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt ./...

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.txt
        continue-on-error: true # non-blocking; coverage upload failures don't break CI

  # ── Go: build binary ───────────────────────────────────────────────────────
  build:
    name: Build binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

  # ── Docker: build only (no push on CI) ────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validate only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm: lint + template render ──────────────────────────────────────────
  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart (strict)
        run: helm lint charts/yk-update-checker --strict

      - name: Template render (smoke test)
        run: |
          helm template smoke charts/yk-update-checker \
            --set config.repos[0].name=test \
            --set config.repos[0].repo=https://github.com/example/test
