name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ── Go: vet, lint, test ────────────────────────────────────────────────────
  go:
    name: Go lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        continue-on-error: true
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt ./...

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.txt
        continue-on-error: true

  # ── Go: build all binaries ─────────────────────────────────────────────────
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

  # ── Docker: build all three images (no push) ──────────────────────────────
  docker:
    name: Docker build (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, scanner, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          push: false
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  # ── Helm: lint + template render ──────────────────────────────────────────
  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart (strict)
        run: helm lint charts/yk-update-checker --strict

      - name: Template render (smoke test)
        run: |
          helm template smoke charts/yk-update-checker \
            --set scanner.config.repos[0].name=test \
            --set scanner.config.repos[0].repo=https://github.com/example/test
