name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # create GitHub Releases and upload assets
  packages: write    # push images and charts to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/update-checker
  CHART_NAME: yk-update-checker
  CHART_DIR: charts/yk-update-checker

jobs:
  # ── Derive version once, share across jobs ─────────────────────────────────
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag:     ${{ steps.version.outputs.tag }}
      date:    ${{ steps.date.outputs.date }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Capture build date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  # ── Build and push all three images in parallel ────────────────────────────
  build-images:
    name: Build & push ${{ matrix.component }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, scanner, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:latest
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.version.outputs.date }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  # ── Package Helm chart and create GitHub Release ───────────────────────────
  release:
    name: Package chart & release
    needs: [version, build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for release notes

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to Helm OCI registry (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package Helm chart
        id: helm-package
        run: |
          helm package ${{ env.CHART_DIR }} \
            --version "${{ needs.version.outputs.version }}" \
            --app-version "${{ needs.version.outputs.version }}" \
            --destination .
          echo "tgz=${{ env.CHART_NAME }}-${{ needs.version.outputs.version }}.tgz" >> "$GITHUB_OUTPUT"

      - name: Push Helm chart to GHCR
        run: |
          helm push ${{ steps.helm-package.outputs.tgz }} \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.helm-package.outputs.tgz }}
          body: |
            ## Docker images

            ```
            docker pull ${{ env.IMAGE_PREFIX }}-api:${{ needs.version.outputs.version }}
            docker pull ${{ env.IMAGE_PREFIX }}-scanner:${{ needs.version.outputs.version }}
            docker pull ${{ env.IMAGE_PREFIX }}-dashboard:${{ needs.version.outputs.version }}
            ```

            ## Helm chart

            ```bash
            helm install yk-update-checker \
              oci://ghcr.io/${{ github.repository_owner }}/charts/yk-update-checker \
              --version ${{ needs.version.outputs.version }} \
              -f values.yaml
            ```
