name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # create GitHub Releases and upload assets
  packages: write    # push images and charts to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  CHART_NAME: yk-update-checker
  CHART_DIR: charts/yk-update-checker

jobs:
  release:
    name: Build, push & release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for release notes

      # ── Derive semver from tag (strip leading "v") ─────────────────────────
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}"  >> "$GITHUB_OUTPUT"

      - name: Capture build date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      # ── Docker ────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=yk-update-checker
            org.opencontainers.image.description=Scans Helm and FluxCD repos for chart updates
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Helm chart ────────────────────────────────────────────────────────
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to Helm OCI registry (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package Helm chart
        id: helm-package
        run: |
          helm package ${{ env.CHART_DIR }} \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination .
          echo "tgz=${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz" >> "$GITHUB_OUTPUT"

      - name: Push Helm chart to GHCR
        run: |
          helm push ${{ steps.helm-package.outputs.tgz }} \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.helm-package.outputs.tgz }}
          body: |
            ## Docker image

            ```
            docker pull ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ```

            ## Helm chart

            ```bash
            helm install yk-update-checker \
              oci://ghcr.io/${{ github.repository_owner }}/charts/yk-update-checker \
              --version ${{ steps.version.outputs.version }} \
              --set config.repos[0].name=my-gitops \
              --set config.repos[0].repo=https://github.com/example/gitops
            ```

            Image digest: `${{ steps.docker-build.outputs.digest }}`
