{{- if .Values.api.enableTrigger }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "yk-update-checker.fullname" . }}-job-creator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yk-update-checker.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
{{- end }}
