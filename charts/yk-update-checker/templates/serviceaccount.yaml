{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "yk-update-checker.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yk-update-checker.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /* Automount token if trigger is enabled (API needs it to create Jobs) */}}
automountServiceAccountToken: {{ or .Values.api.enableTrigger .Values.serviceAccount.automount }}
{{- end }}
